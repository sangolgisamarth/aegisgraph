{% extends "base.html" %}
{% block title %}Error — AegisGraph{% endblock %}
{% block page_title %}Error{% endblock %}

{% block content %}
<div class="card" style="max-width: 480px; margin: 60px auto; text-align: center;">
  <div style="font-size: 32px; margin-bottom: 12px;">⬡</div>
  <div style="font-family: var(--font-mono); font-size: 14px; color: var(--critical); margin-bottom: 8px;">Analysis Failed</div>
  <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 20px;">{{ message }}</div>
  <a href="{{ url_for('audit_new') }}" class="btn btn-primary" style="margin: 0 auto; display: inline-flex;">Try again</a>
</div>
{% endblock %}
